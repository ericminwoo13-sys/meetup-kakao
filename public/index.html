<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>중간 지점 찾기</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css"/>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&family=Space+Mono&display=swap');
:root{
  --bg:#0c0e14;--surface:#13161f;--surface2:#1a1e2b;--surface3:#1f2435;
  --border:#252a3a;--border2:#2f3649;
  --accent:#5b8dee;--accent-glow:rgba(91,141,238,.18);
  --green:#3ecf8e;--green-glow:rgba(62,207,142,.15);
  --red:#f06595;
  --text:#dde3f0;--text2:#7b88a8;--text3:#3a4259;
  --r:10px;--r2:14px;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;font-family:'Noto Sans KR',sans-serif;background:var(--bg);color:var(--text)}
header{height:58px;display:flex;align-items:center;gap:12px;padding:0 20px;background:var(--surface);border-bottom:1px solid var(--border);z-index:10;}
.logo{width:34px;height:34px;border-radius:9px;background:linear-gradient(135deg,var(--accent),#8b6dff);display:flex;align-items:center;justify-content:center;font-size:17px;}
.logo-text h1{font-size:15px;font-weight:700;}
.logo-text p{font-size:11px;color:var(--text2);margin-top:1px}
.layout{display:flex;height:calc(100vh - 58px)}
.panel{width:360px;min-width:320px;background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow-y:auto;overflow-x:hidden;}
.panel::-webkit-scrollbar{width:4px}
.panel::-webkit-scrollbar-thumb{background:var(--border2);border-radius:4px}
.sec{padding:18px;border-bottom:1px solid var(--border)}
.sec-label{font-size:10px;font-weight:700;letter-spacing:1.4px;text-transform:uppercase;color:var(--text3);margin-bottom:14px;}
.friend-rows{display:flex;flex-direction:column;gap:8px}
.friend-row{display:flex;align-items:center;gap:9px;background:var(--surface2);border:1px solid var(--border);border-radius:var(--r);padding:9px 11px;transition:border-color .2s;}
.friend-row:focus-within{border-color:var(--accent)}
.f-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0}
.ac-wrap{flex:1;position:relative}
.ac-wrap input{width:100%;background:none;border:none;outline:none;color:var(--text);font-family:'Noto Sans KR',sans-serif;font-size:13px;}
.ac-wrap input::placeholder{color:var(--text3)}
.ac-drop{display:none;position:absolute;top:calc(100% + 8px);left:-40px;width:290px;background:var(--surface3);border:1px solid var(--border2);border-radius:var(--r2);z-index:9999;overflow:hidden;box-shadow:0 12px 32px rgba(0,0,0,.5);}
.ac-item{padding:9px 14px;font-size:12px;cursor:pointer;border-bottom:1px solid var(--border);}
.ac-item:last-child{border-bottom:none}
.ac-item:hover{background:var(--accent-glow)}
.ac-item .sub{font-size:10px;color:var(--text2);margin-top:2px}
.rm-btn{background:none;border:none;cursor:pointer;color:var(--text3);font-size:15px;padding:0 2px;line-height:1;flex-shrink:0;}
.time-badge{
  font-size:10px;font-weight:700;padding:2px 7px;border-radius:20px;
  background:var(--accent-glow);color:var(--accent);
  white-space:nowrap;flex-shrink:0;display:none;
}
.rm-btn:hover{color:var(--red)}
.add-btn{display:flex;align-items:center;justify-content:center;gap:7px;width:100%;padding:9px;margin-top:8px;background:none;border:1px dashed var(--border2);border-radius:var(--r);color:var(--text2);font-size:13px;cursor:pointer;font-family:'Noto Sans KR',sans-serif;}
.add-btn:hover{border-color:var(--accent);color:var(--accent);background:var(--accent-glow)}
.find-btn{display:flex;align-items:center;justify-content:center;gap:8px;width:100%;padding:13px;margin-top:12px;background:var(--accent);border:none;border-radius:var(--r);color:#fff;font-size:14px;font-weight:700;cursor:pointer;font-family:'Noto Sans KR',sans-serif;}
.find-btn:hover{opacity:.88}
.find-btn:disabled{opacity:.35;cursor:not-allowed}
.ld{display:none;align-items:center;gap:9px;padding:10px 0;font-size:12px;color:var(--text2)}
.ld.on{display:flex}
.spin{width:14px;height:14px;border:2px solid var(--border2);border-top-color:var(--accent);border-radius:50%;animation:spin .65s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.result-grid{display:flex;flex-direction:column;gap:8px}
.r-card{background:var(--surface2);border:1px solid var(--border);border-radius:var(--r2);padding:13px 14px;cursor:pointer;transition:border-color .2s,background .2s;}
.r-card:hover{border-color:var(--accent)}
.r-card.sel{border-color:var(--accent);background:var(--accent-glow)}
.r-card-top{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.badge{font-size:9px;font-weight:700;letter-spacing:.8px;padding:3px 8px;border-radius:20px;text-transform:uppercase;}
.badge-g{background:var(--green-glow);color:var(--green)}
.badge-b{background:var(--accent-glow);color:var(--accent)}
.r-card h3{font-size:13px;font-weight:500;line-height:1.4}
.r-card .desc{font-size:11px;color:var(--text2);margin-top:4px}
.r-card .coords{font-family:'Space Mono',monospace;font-size:10px;color:var(--text3);margin-top:6px}
.subway-row{display:flex;flex-wrap:wrap;gap:4px;margin-top:8px}
.s-badge{font-size:10px;font-weight:700;padding:2px 8px;border-radius:20px;color:#fff;display:inline-flex;align-items:center;cursor:pointer;}
.main-station{
  display:flex;align-items:center;gap:8px;margin:6px 0 4px;
  padding:7px 10px;border-radius:var(--r);
  background:var(--surface3);border:1px solid var(--border2);
  cursor:pointer;transition:border-color .2s;
}
.main-station:hover{border-color:var(--accent)}
.main-station-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.main-station-name{font-size:13px;font-weight:700;color:var(--text);flex:1}
.main-station-label{font-size:10px;color:var(--text2)}
.cat-tabs{display:flex;flex-wrap:wrap;gap:5px}
.cat-tab{padding:5px 11px;border-radius:20px;font-size:12px;font-weight:500;border:1px solid var(--border);background:none;color:var(--text2);cursor:pointer;font-family:'Noto Sans KR',sans-serif;}
.cat-tab:hover,.cat-tab.on{border-color:var(--accent);color:var(--accent);background:var(--accent-glow)}
.place-list{display:flex;flex-direction:column;gap:7px;margin-top:12px}
.p-item{display:flex;gap:10px;align-items:flex-start;background:var(--surface2);border:1px solid var(--border);border-radius:var(--r);padding:11px 12px;cursor:pointer;}
.p-item:hover{border-color:var(--accent)}
.p-num{width:22px;height:22px;border-radius:6px;flex-shrink:0;background:var(--accent-glow);color:var(--accent);font-size:11px;font-weight:700;display:flex;align-items:center;justify-content:center;}
.p-info h4{font-size:13px;font-weight:500}
.p-info .p-addr{font-size:11px;color:var(--text2);margin-top:3px;line-height:1.4}
.p-info .p-dist{font-size:10px;color:var(--text3);margin-top:4px}
.empty{text-align:center;padding:24px 0;font-size:12px;color:var(--text3);line-height:2}
#map{flex:1}
.leaflet-container{background:#1a1e2b}
.detail-panel{
  position:absolute;right:-320px;top:0;width:300px;height:100%;
  background:var(--surface);border-left:1px solid var(--border);
  z-index:1000;transition:right .3s ease;display:flex;flex-direction:column;
  overflow-y:auto;
}
.detail-panel.open{right:0}
.detail-header{padding:16px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px;}
.detail-close{background:none;border:none;cursor:pointer;color:var(--text2);font-size:18px;margin-left:auto;line-height:1;}
.detail-close:hover{color:var(--text)}
.detail-body{padding:16px;display:flex;flex-direction:column;gap:12px;}
.detail-name{font-size:15px;font-weight:700;color:var(--text)}
.detail-cat{font-size:11px;color:var(--accent);background:var(--accent-glow);padding:2px 8px;border-radius:20px;display:inline-block;margin-top:4px;}
.detail-row{display:flex;gap:10px;align-items:flex-start;font-size:12px;}
.detail-icon{width:16px;flex-shrink:0;color:var(--text3);margin-top:1px;font-size:14px;}
.detail-val{color:var(--text2);line-height:1.5;flex:1}
.detail-photos{display:flex;gap:6px;overflow-x:auto;margin-bottom:4px;}
.detail-photos img{width:88px;height:68px;object-fit:cover;border-radius:6px;flex-shrink:0;background:var(--surface3);}
.detail-rating{display:flex;align-items:center;gap:6px;font-size:13px;font-weight:500;color:var(--text)}
.detail-rating .stars{color:#f7b731;font-size:14px;}
.detail-rating .count{font-size:11px;color:var(--text2)}
.detail-open{font-size:11px;padding:2px 8px;border-radius:20px;font-weight:700;}
.detail-open.on{background:var(--green-glow);color:var(--green)}
.detail-open.off{background:rgba(240,101,149,.15);color:var(--red)}
.share-btn{
  display:flex;align-items:center;justify-content:center;gap:7px;
  width:100%;padding:11px;margin-top:8px;
  background:#FEE500;border:none;border-radius:var(--r);
  color:#191919;font-size:13px;font-weight:700;
  cursor:pointer;font-family:'Noto Sans KR',sans-serif;
  transition:opacity .2s;
}
.share-btn:hover{opacity:.88}
.share-btn svg{width:18px;height:18px;flex-shrink:0}
.detail-link{
  display:flex;align-items:center;justify-content:center;gap:6px;
  width:100%;padding:10px;margin-top:4px;
  background:var(--accent);border:none;border-radius:var(--r);
  color:#fff;font-size:13px;font-weight:700;cursor:pointer;
  font-family:'Noto Sans KR',sans-serif;text-decoration:none;
}
.detail-link:hover{opacity:.88}
.map-wrap{position:relative;flex:1;display:flex;overflow:hidden;}
</style>
</head>
<body>
<header>
  <div class="logo">📍</div>
  <div class="logo-text">
    <h1>중간 지점 찾기</h1>
    <p>모두에게 공평한 만남 장소를 찾아드려요</p>
  </div>
</header>
<div class="layout">
  <aside class="panel">
    <div class="sec">
      <div class="sec-label">친구 위치</div>
      <div class="friend-rows" id="friendRows"></div>
      <button class="add-btn" id="addBtn"><span style="font-size:16px;line-height:1">+</span> 친구 추가</button>
      <button class="find-btn" id="findBtn">🔍 중간 지점 찾기</button>
      <div class="ld" id="ld"><div class="spin"></div> 계산 중…</div>
    </div>
    <div class="sec" id="secResult" style="display:none">
      <div class="sec-label">계산 결과</div>
      <div class="result-grid" id="resultGrid"></div>
      <button class="share-btn" id="shareBtn" style="display:none">
        <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 2C6.477 2 2 5.805 2 10.5c0 2.88 1.612 5.437 4.125 7.094L5 21l4.188-2.094C10.055 19.27 11.01 19.5 12 19.5c5.523 0 10-3.805 10-9S17.523 2 12 2z"/></svg>
        카카오톡으로 공유하기
      </button>
    </div>
    <div class="sec" id="secPlaces" style="display:none">
      <div class="sec-label">주변 장소</div>
      <div class="cat-tabs" id="catTabs">
        <button class="cat-tab on" data-code="FD6">🍽 맛집</button>
        <button class="cat-tab" data-code="CE7">☕ 카페</button>
        <button class="cat-tab" data-code="SW8">🚇 지하철</button>
        <button class="cat-tab" data-code="AT4">🎭 볼거리</button>
        <button class="cat-tab" data-code="CT1">🏛 문화</button>
      </div>
      <div class="place-list" id="placeList"><div class="empty">중간 지점을 먼저 선택해 주세요</div></div>
    </div>
  </aside>
  <div class="map-wrap">
  <div id="map"></div>
  <div class="detail-panel" id="detailPanel">
    <div class="detail-header">
      <div>
        <div class="detail-name" id="dpName"></div>
        <div class="detail-cat" id="dpCat"></div>
      </div>
      <button class="detail-close" id="dpClose">✕</button>
    </div>
    <div class="detail-body">
      <div class="detail-photos" id="dpPhotos" style="display:none"></div>
      <div class="detail-rating" id="dpRating" style="display:none">
        <span class="stars" id="dpStars"></span>
        <span id="dpRatingVal"></span>
        <span class="count" id="dpRatingCount"></span>
        <span class="detail-open" id="dpOpen" style="display:none"></span>
      </div>
      <div class="detail-row" id="dpAddrRow">
        <span class="detail-icon">📍</span>
        <span class="detail-val" id="dpAddr"></span>
      </div>
      <div class="detail-row" id="dpPhoneRow" style="display:none">
        <span class="detail-icon">📞</span>
        <span class="detail-val" id="dpPhone"></span>
      </div>
      <div class="detail-row" id="dpDistRow" style="display:none">
        <span class="detail-icon">📏</span>
        <span class="detail-val" id="dpDist"></span>
      </div>
      <a class="detail-link" id="dpLink" target="_blank">카카오맵에서 보기 →</a>
    </div>
  </div>
</div>
</div>
 
<script src="https://t1.kakaocdn.net/kakao_js_sdk/2.7.2/kakao.min.js" crossorigin="anonymous"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<script>
var COLORS = ['#5b8dee','#f06595','#3ecf8e','#f7b731','#a29bfe','#fd79a8','#00cec9','#e17055'];
var SUBWAY_COLORS = {'1호선':'#0052A4','2호선':'#00A84D','3호선':'#EF7C1C','4호선':'#00A5DE','5호선':'#996CAC','6호선':'#CD7C2F','7호선':'#747F00','8호선':'#E6186C','9호선':'#BDB092','신분당선':'#D4003B','경강선':'#0052A4','수인분당선':'#F5A200','경의중앙선':'#77C4A3','GTX-A':'#9E4784'};
 
var map, friends, uid, fMarkers, midMarkers, polylines, placeMarkers, activeMid, acTimers;
 
function init() {
  friends = [{id:0,label:'친구 1',addr:'',lat:null,lng:null},{id:1,label:'친구 2',addr:'',lat:null,lng:null}];
  uid=2; fMarkers=[]; midMarkers=[]; polylines=[]; placeMarkers=[]; activeMid=null; acTimers={};
 
  map = L.map('map', {
    center: [37.5759, 126.9769],
    zoom: 15,
    zoomControl: true,
  });
 
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '© OpenStreetMap contributors',
    maxZoom: 19,
  }).addTo(map);
 
  renderFriends();
 
  // 카카오 공유 SDK 초기화
  fetch('/api/config').then(function(r){return r.json();}).then(function(cfg){
    if (window.Kakao && !Kakao.isInitialized()) Kakao.init(cfg.jsKey);
  });
 
  document.getElementById('addBtn').addEventListener('click', addFriend);
  document.getElementById('findBtn').addEventListener('click', doFind);
  document.getElementById('catTabs').addEventListener('click', function(e) {
    var btn = e.target.closest('.cat-tab');
    if (!btn) return;
    document.querySelectorAll('.cat-tab').forEach(function(t){t.classList.remove('on');});
    btn.classList.add('on');
    if (activeMid) loadPlaces(btn.dataset.code, activeMid.lat, activeMid.lng);
  });
  document.getElementById('dpClose').addEventListener('click', closeDetail);
  document.addEventListener('click', function(e) {
    friends.forEach(function(f) {
      var d=document.getElementById('ac-'+f.id), i=document.getElementById('inp-'+f.id);
      if (d && !d.contains(e.target) && e.target!==i) d.style.display='none';
    });
  });
}
 
function renderFriends() {
  var wrap = document.getElementById('friendRows');
  wrap.innerHTML = '';
  friends.forEach(function(f, i) {
    var color = COLORS[i % COLORS.length];
    var div = document.createElement('div');
    div.className = 'friend-row';
    div.innerHTML =
      '<div class="f-dot" style="background:'+color+'"></div>'+
      '<div class="ac-wrap">'+
        '<input id="inp-'+f.id+'" type="text" value="'+f.addr+'" placeholder="'+f.label+' 위치 검색" autocomplete="off"/>'+
        '<div class="ac-drop" id="ac-'+f.id+'"></div>'+
      '</div>'+
      '<span class="time-badge" id="time-'+f.id+'"></span>'+
      (friends.length > 2 ? '<button class="rm-btn" data-id="'+f.id+'">✕</button>' : '');
    wrap.appendChild(div);
    (function(fid) {
      var inp = document.getElementById('inp-'+fid);
      inp.addEventListener('input', function(){onInput(fid, this.value);});
      inp.addEventListener('focus', function(){if(this.value.length>=2) onInput(fid, this.value);});
    })(f.id);
    var rm = div.querySelector('.rm-btn');
    if (rm) rm.addEventListener('click', function(){removeFriend(parseInt(this.dataset.id));});
  });
}
 
function addFriend() {
  friends.push({id:uid++, label:'친구 '+(friends.length+1), addr:'', lat:null, lng:null});
  renderFriends();
}
 
function removeFriend(id) {
  friends = friends.filter(function(f){return f.id!==id;});
  renderFriends();
  refreshFMarkers();
}
 
function onInput(id, val) {
  var f = friends.find(function(f){return f.id===id;});
  if (!f) return;
  f.addr=val; f.lat=null; f.lng=null;
  clearTimeout(acTimers[id]);
  if (!val || val.length<2) {closeAc(id); return;}
  acTimers[id] = setTimeout(function(){fetchAc(id, val);}, 380);
}
 
function fetchAc(id, query) {
  Promise.all([
    fetch('/api/search/keyword?query='+encodeURIComponent(query)).then(function(r){return r.json();}),
    fetch('/api/search/address?query='+encodeURIComponent(query)).then(function(r){return r.json();})
  ]).then(function(res) {
    var items = [];
    (res[0].documents||[]).slice(0,4).forEach(function(d){
      items.push({name:d.place_name, addr:d.road_address_name||d.address_name, lat:parseFloat(d.y), lng:parseFloat(d.x)});
    });
    (res[1].documents||[]).slice(0,3).forEach(function(d){
      var a = d.road_address||d.address;
      if (a) items.push({name:a.address_name, addr:'', lat:parseFloat(d.y), lng:parseFloat(d.x)});
    });
    showAc(id, items.slice(0,6));
  }).catch(function(){closeAc(id);});
}
 
function showAc(id, items) {
  var drop = document.getElementById('ac-'+id);
  if (!drop || !items.length) {closeAc(id); return;}
  drop.innerHTML = '';
  items.forEach(function(it) {
    var div = document.createElement('div');
    div.className = 'ac-item';
    div.innerHTML = it.name + (it.addr ? '<div class="sub">'+it.addr+'</div>' : '');
    (function(item){div.addEventListener('click', function(){pickAddr(id, item.name, item.lat, item.lng);});})(it);
    drop.appendChild(div);
  });
  drop.style.display = 'block';
}
 
function closeAc(id) {var d=document.getElementById('ac-'+id); if(d) d.style.display='none';}
 
function pickAddr(id, name, lat, lng) {
  var f = friends.find(function(f){return f.id===id;});
  if (!f) return;
  f.addr=name; f.lat=lat; f.lng=lng;
  var inp = document.getElementById('inp-'+id);
  if (inp) inp.value = name;
  closeAc(id);
  refreshFMarkers();
  // 위치 바뀌면 이동시간 초기화
  friends.forEach(function(fr){
    var b = document.getElementById('time-'+fr.id);
    if (b) b.style.display='none';
  });
}
 
function refreshFMarkers() {
  fMarkers.forEach(function(m){map.removeLayer(m);}); fMarkers=[];
  var valid = friends.filter(function(f){return f.lat&&f.lng;});
  valid.forEach(function(f, i) {
    var color = COLORS[friends.indexOf(f) % COLORS.length];
    var icon = L.divIcon({
      className: '',
      html: '<div style="width:14px;height:14px;border-radius:50%;background:'+color+';border:2.5px solid #fff;box-shadow:0 2px 6px rgba(0,0,0,.4)"></div>',
      iconSize: [14,14], iconAnchor: [7,7]
    });
    var marker = L.marker([f.lat, f.lng], {icon:icon}).addTo(map);
    marker.bindPopup('<b>'+f.label+'</b><br><span style="font-size:11px;color:#888">'+f.addr+'</span>');
    fMarkers.push(marker);
  });
  if (valid.length >= 2) {
    var bounds = L.latLngBounds(valid.map(function(f){return [f.lat, f.lng];}));
    map.fitBounds(bounds, {padding:[50,50]});
  }
}
 
function doFind() {
  var valid = friends.filter(function(f){return f.lat&&f.lng;});
  if (valid.length < 2) {alert('위치를 2개 이상 입력해 주세요.'); return;}
  setBusy(true);
  fetch('/api/midpoint', {
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({locations:valid})
  }).then(function(r){return r.json();})
  .then(function(data){showResults(data, valid);})
  .catch(function(e){alert('오류: '+e.message); setBusy(false);});
}
 
function showResults(data, valid) {
  var simple=data.simple, tb=data.timeBased;
  Promise.all([revGeo(simple.lng, simple.lat), revGeo(tb.lng, tb.lat)]).then(function(addrs) {
    midMarkers.forEach(function(m){map.removeLayer(m);}); midMarkers=[];
    polylines.forEach(function(p){map.removeLayer(p);}); polylines=[];
 
    var pts = [
      {lat:simple.lat, lng:simple.lng, label:'거리 기반', desc:'좌표 평균 중간점', badgeClass:'badge-g', color:'#3ecf8e', addr:addrs[0]},
      {lat:tb.lat, lng:tb.lng, label:'이동 시간 기반', desc:'최대 이동시간 최소 지점', badgeClass:'badge-b', color:'#5b8dee', addr:addrs[1]}
    ];
 
    pts.forEach(function(pt, pi) {
      var icon = L.divIcon({
        className: '',
        html: '<div style="display:flex;align-items:center;gap:6px;background:'+pt.color+';border:2.5px solid #fff;border-radius:20px;padding:5px 12px 5px 8px;box-shadow:0 3px 10px rgba(0,0,0,.5);white-space:nowrap;">'+
              '<span style="font-size:13px;color:#fff;line-height:1">'+(pi===0?'◉':'★')+'</span>'+
              '<span style="font-size:12px;font-weight:700;color:#fff;font-family:Noto Sans KR,sans-serif;">'+pt.label+'</span>'+
              '</div>',
        iconSize: [130,32], iconAnchor: [14,16]
      });
      var marker = L.marker([pt.lat, pt.lng], {icon:icon, zIndexOffset:1000}).addTo(map);
      marker.bindPopup('<b>'+pt.label+'</b><br>'+pt.addr);
      midMarkers.push(marker);
 
      valid.forEach(function(f, fi) {
        var line = L.polyline([[f.lat,f.lng],[pt.lat,pt.lng]], {
          color:COLORS[fi%COLORS.length], weight:2.5, opacity:0.75, dashArray:'8,5'
        }).addTo(map);
        polylines.push(line);
      });
    });
 
    document.getElementById('secResult').style.display = 'block';
    document.getElementById('secPlaces').style.display = 'block';
    var sb = document.getElementById('shareBtn');
    sb.style.display = 'flex';
    sb.onclick = shareResult;
    var grid = document.getElementById('resultGrid');
    grid.innerHTML = '';
 
    pts.forEach(function(pt, pi) {
      var card = document.createElement('div');
      card.className = 'r-card' + (pi===0?' sel':'');
      card.innerHTML =
        '<div class="r-card-top"><span class="badge '+pt.badgeClass+'">'+pt.label+'</span></div>'+
        '<div class="main-station" id="ms-'+pi+'">'+
          '<div class="main-station-dot" id="ms-dot-'+pi+'" style="background:#444"></div>'+
          '<div class="main-station-name" id="ms-name-'+pi+'">지하철역 검색 중…</div>'+
          '<div class="main-station-label">추천역</div>'+
        '</div>'+
        '<div class="desc">'+pt.desc+'</div>'+
        '<div class="coords">'+pt.lat.toFixed(5)+', '+pt.lng.toFixed(5)+'</div>'+
        '<div class="subway-row" id="sw-'+pi+'"></div>';
      (function(p, idx){card.addEventListener('click', function() {
        document.querySelectorAll('.r-card').forEach(function(c){c.classList.remove('sel');});
        card.classList.add('sel');
        activeMid = p;
        showSubwayMarkers(idx);
        var onTab = document.querySelector('.cat-tab.on');
        if (onTab) loadPlaces(onTab.dataset.code, p.lat, p.lng);
      });})(pt, pi);
      grid.appendChild(card);
      loadSubwayBadges(pt.lat, pt.lng, pi);
    });
 
    activeMid = pts[0];
    map.setView([pts[0].lat, pts[0].lng], 17);
    loadPlaces('FD6', pts[0].lat, pts[0].lng);
 
    // 각 친구별 이동 시간 — 최적 지하철역 로드 후 계산
    // loadSubwayBadges 가 비동기라 약간 대기 후 실행
    setTimeout(function(){
      var row0 = document.getElementById('sw-0');
      var sLat = row0 && row0.dataset.mainLat ? parseFloat(row0.dataset.mainLat) : pts[0].lat;
      var sLng = row0 && row0.dataset.mainLng ? parseFloat(row0.dataset.mainLng) : pts[0].lng;
      showTravelTimes(sLat, sLng);
    }, 1500);
    setBusy(false);
  });
}
 
var subwayMarkers = [];
 
function searchSubwayWithRadius(lat, lng, pi, radius) {
  fetch('/api/search/category?category_group_code=SW8&x='+lng+'&y='+lat+'&radius='+radius)
    .then(function(r){return r.json();})
    .then(function(data) {
      var docs = (data.documents||[]);
      // 결과 없고 반경이 10000 미만이면 반경 늘려서 재시도
      if (!docs.length && radius < 10000) {
        var next = radius === 2000 ? 5000 : 10000;
        searchSubwayWithRadius(lat, lng, pi, next);
        return;
      }
      applySubwayResults(lat, lng, pi, docs);
    }).catch(function(){});
}
 
function loadSubwayBadges(lat, lng, pi) {
  searchSubwayWithRadius(lat, lng, pi, 2000);
}
 
function applySubwayResults(lat, lng, pi, rawDocs) {
      var row = document.getElementById('sw-'+pi);
      var msName = document.getElementById('ms-name-'+pi);
      var msDot  = document.getElementById('ms-dot-'+pi);
      var msBox  = document.getElementById('ms-'+pi);
      if (!row) return;
 
      var seen = new Set();
      var docs = (rawDocs||[]).filter(function(d){
        if (seen.has(d.place_name)) return false;
        seen.add(d.place_name); return true;
      }).slice(0,4);
 
      if (!docs.length) {
        if (msName) msName.textContent = '근처 지하철역 없음';
        return;
      }
 
      // 첫번째 역 → 메인 표시
      var main = docs[0];
      var mainMatch = main.place_name.match(/(\d+호선|신분당선|경강선|수인분당선|경의중앙선|GTX-[A-Z])/);
      var mainColor = mainMatch ? (SUBWAY_COLORS[mainMatch[1]]||'#5b8dee') : '#5b8dee';
      if (msName) msName.textContent = main.place_name;
      if (msDot)  msDot.style.background = mainColor;
      if (msBox) {
        (function(doc){msBox.addEventListener('click', function(e){
          e.stopPropagation();
          map.setView([parseFloat(doc.y), parseFloat(doc.x)], 16);
        });})(main);
      }
 
      // 나머지 역 → 배지
      row.innerHTML = '';
      docs.slice(1).forEach(function(d) {
        var match = d.place_name.match(/(\d+호선|신분당선|경강선|수인분당선|경의중앙선|GTX-[A-Z])/);
        var color = match ? (SUBWAY_COLORS[match[1]]||'#444') : '#444';
        var badge = document.createElement('span');
        badge.className = 's-badge';
        badge.style.background = color;
        badge.textContent = d.place_name;
        (function(doc){badge.addEventListener('click', function(e){
          e.stopPropagation();
          map.setView([parseFloat(doc.y), parseFloat(doc.x)], 16);
        });})(d);
        row.appendChild(badge);
      });
 
      // 지도 마커용 데이터 저장
      row.dataset.docs = JSON.stringify(docs);
      row.dataset.mainLat = main.y;
      row.dataset.mainLng = main.x;
}
 
function showSubwayMarkers(pi) {
  subwayMarkers.forEach(function(m){map.removeLayer(m);}); subwayMarkers=[];
  var row = document.getElementById('sw-'+pi);
  if (!row || !row.dataset.docs) return;
  var docs = JSON.parse(row.dataset.docs);
 
  // 현재 선택된 중간점 마커 위치
  var midMarker = midMarkers[pi];
  var midLatLng = midMarker ? midMarker.getLatLng() : null;
 
  // fitBounds 계산용
  var bounds = midLatLng ? L.latLngBounds([midLatLng]) : null;
 
  docs.forEach(function(d, i) {
    var plat = parseFloat(d.y), plng = parseFloat(d.x);
    var match = d.place_name.match(/(\d+호선|신분당선|경강선|수인분당선|경의중앙선|GTX-[A-Z])/);
    var color = match ? (SUBWAY_COLORS[match[1]]||'#555') : '#555';
    var isMain = i === 0;
    var icon = L.divIcon({
      className:'',
      html:'<div style="background:'+color+';border:'+(isMain?'3':'2')+'px solid #fff;border-radius:6px;padding:'+(isMain?'5px 11px':'3px 8px')+';font-size:'+(isMain?'13':'11')+'px;font-weight:700;color:#fff;white-space:nowrap;box-shadow:0 2px 8px rgba(0,0,0,.6);">🚇 '+d.place_name+'</div>',
      iconSize:[140,isMain?30:24], iconAnchor:[12,isMain?15:12]
    });
    var marker = L.marker([plat,plng],{icon:icon,zIndexOffset:isMain?900:800}).addTo(map);
    marker.bindPopup('<b>'+d.place_name+'</b><br><span style="font-size:11px;color:#888">'+(d.road_address_name||d.address_name||'')+'</span>');
    (function(doc){marker.on('click', function(){openDetail(doc);});})(d);
    subwayMarkers.push(marker);
    if (bounds) bounds.extend([plat, plng]);
  });
 
  // 중간점 + 추천역 모두 보이도록 자동 줌
  if (bounds && bounds.isValid()) {
    map.fitBounds(bounds, {padding:[60,60], maxZoom:16});
  }
}
 
function loadPlaces(code, lat, lng) {
  var list = document.getElementById('placeList');
  list.innerHTML = '<div class="empty"><div class="spin" style="margin:0 auto 8px"></div></div>';
  placeMarkers.forEach(function(m){map.removeLayer(m);}); placeMarkers=[];
 
  fetch('/api/search/category?category_group_code='+code+'&x='+lng+'&y='+lat+'&radius=3000')
    .then(function(r){return r.json();})
    .then(function(data) {
      var docs = data.documents||[];
      if (!docs.length) {list.innerHTML='<div class="empty">검색 결과 없음</div>'; return;}
      list.innerHTML = '';
      docs.slice(0,5).forEach(function(d, i) {
        var plat=parseFloat(d.y), plng=parseFloat(d.x);
        var el = document.createElement('div');
        el.className = 'p-item';
        el.innerHTML =
          '<div class="p-num">'+(i+1)+'</div>'+
          '<div class="p-info">'+
            '<h4>'+d.place_name+'</h4>'+
            '<div class="p-addr">'+(d.road_address_name||d.address_name||'')+'</div>'+
            (d.distance ? '<div class="p-dist">중간점에서 '+Math.round(d.distance)+'m</div>' : '')+
          '</div>';
        (function(doc, lat, lng, num, name){el.addEventListener('click', function(){
          // 기존 장소 마커 모두 제거
          placeMarkers.forEach(function(m){map.removeLayer(m);}); placeMarkers=[];
          // 클릭한 장소 마커만 표시
          var icon = L.divIcon({
            className:'',
            html:'<div style="background:#5b8dee;border:2px solid #fff;border-radius:6px;padding:3px 9px;font-size:11px;font-weight:700;color:#fff;white-space:nowrap;box-shadow:0 2px 8px rgba(0,0,0,.5)">'+num+'. '+(name.length>8?name.slice(0,8)+'…':name)+'</div>',
            iconSize:[130,24], iconAnchor:[12,12]
          });
          placeMarkers.push(L.marker([lat,lng],{icon:icon,zIndexOffset:500}).addTo(map));
          map.setView([lat, lng], 16);
          setTimeout(function(){ map.invalidateSize(); }, 50);
          openDetail(doc);
        });})(d, plat, plng, i+1, d.place_name);
 
        // 마커 데이터 저장 (카드 클릭 시 표시)
        el.dataset.lat = plat;
        el.dataset.lng = plng;
        el.dataset.name = d.place_name;
        el.dataset.idx = i+1;
        list.appendChild(el);
      });
    }).catch(function(e){list.innerHTML='<div class="empty">오류: '+e.message+'</div>';});
}
 
function revGeo(lng, lat) {
  return fetch('/api/geo/coord2address?x='+lng+'&y='+lat)
    .then(function(r){return r.json();})
    .then(function(d) {
      var doc = d.documents&&d.documents[0];
      if (!doc) return lat.toFixed(4)+', '+lng.toFixed(4);
      return (doc.road_address&&doc.road_address.address_name)||(doc.address&&doc.address.address_name)||lat.toFixed(4)+', '+lng.toFixed(4);
    }).catch(function(){return lat.toFixed(4)+', '+lng.toFixed(4);});
}
 
function openDetail(d) {
  var panel = document.getElementById('detailPanel');
  document.getElementById('dpName').textContent = d.place_name;
  document.getElementById('dpCat').textContent = d.category_name ? d.category_name.split(' > ').pop() : '';
  document.getElementById('dpAddr').textContent = d.road_address_name || d.address_name || '';
 
  // 전화번호
  if (d.phone) {
    document.getElementById('dpPhone').textContent = d.phone;
    document.getElementById('dpPhoneRow').style.display = 'flex';
  } else {
    document.getElementById('dpPhoneRow').style.display = 'none';
  }
 
  // 거리
  if (d.distance) {
    document.getElementById('dpDist').textContent = '중간점에서 '+Math.round(d.distance)+'m';
    document.getElementById('dpDistRow').style.display = 'flex';
  } else {
    document.getElementById('dpDistRow').style.display = 'none';
  }
 
  document.getElementById('dpLink').href = d.place_url || 'https://map.kakao.com/link/search/'+encodeURIComponent(d.place_name);
 
  // 사진/별점 초기화
  document.getElementById('dpPhotos').style.display = 'none';
  document.getElementById('dpPhotos').innerHTML = '';
  document.getElementById('dpRating').style.display = 'none';
 
  panel.classList.add('open');
  setTimeout(function(){ map.invalidateSize(); }, 310);
 
  // Google Places 사진/별점 비동기 로드
  var lat = d.y, lng = d.x;
  fetch('/api/places/search?name='+encodeURIComponent(d.place_name)+'&lat='+lat+'&lng='+lng)
    .then(function(r){return r.json();})
    .then(function(g) {
      if (!g.found) return;
 
      // 별점
      if (g.rating) {
        var stars = Math.round(g.rating);
        var starsHtml = '';
        for (var i=0;i<5;i++) starsHtml += i < stars ? '★' : '☆';
        document.getElementById('dpStars').textContent = starsHtml;
        document.getElementById('dpRatingVal').textContent = g.rating.toFixed(1);
        document.getElementById('dpRatingCount').textContent = '(' + g.user_ratings_total.toLocaleString() + '개)';
        document.getElementById('dpRating').style.display = 'flex';
      }
 
      // 영업 여부
      if (g.open_now !== null) {
        var openEl = document.getElementById('dpOpen');
        openEl.style.display = 'inline-block';
        if (g.open_now) {
          openEl.textContent = '영업중';
          openEl.className = 'detail-open on';
        } else {
          openEl.textContent = '영업종료';
          openEl.className = 'detail-open off';
        }
      }
 
      // 사진
      if (g.photos && g.photos.length) {
        var photoWrap = document.getElementById('dpPhotos');
        photoWrap.innerHTML = '';
        g.photos.forEach(function(url) {
          var img = document.createElement('img');
          img.src = url;
          img.alt = d.place_name;
          img.onerror = function(){this.style.display='none';};
          photoWrap.appendChild(img);
        });
        photoWrap.style.display = 'flex';
      }
    }).catch(function(){});
}
 
function closeDetail() {
  document.getElementById('detailPanel').classList.remove('open');
  setTimeout(function(){ map.invalidateSize(); }, 310);
}
 
function shareResult() {
  if (!activeMid) return;
  var title = '중간 지점을 찾았어요!';
  var desc = activeMid.addr + ' 근처에서 만나요 😊';
  var url = window.location.href;
 
  if (window.Kakao && Kakao.isInitialized()) {
    Kakao.Share.sendDefault({
      objectType: 'text',
      text: title + '\n' + desc + '\n\n📍 ' + activeMid.addr + '\n\n중간 지점 찾기 앱으로 확인하세요!',
      link: { mobileWebUrl: url, webUrl: url },
      buttons: [{ title: '지도에서 보기', link: { mobileWebUrl: url, webUrl: url } }],
    });
  } else {
    // 카카오 SDK 없을 때 링크 복사로 대체
    navigator.clipboard.writeText(title + '\n' + desc + '\n' + url).then(function(){
      alert('링크가 클립보드에 복사됐어요!');
    });
  }
}
 
function calcStraightMinutes(lat1, lng1, lat2, lng2) {
  var R = 6371, d2r = Math.PI/180;
  var dLat = (lat2-lat1)*d2r, dLng = (lng2-lng1)*d2r;
  var a = Math.sin(dLat/2)*Math.sin(dLat/2) +
          Math.cos(lat1*d2r)*Math.cos(lat2*d2r)*
          Math.sin(dLng/2)*Math.sin(dLng/2);
  var dist = R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
  return Math.round(dist * 1.4 / 30 * 60);
}
 
function formatMinutes(minutes) {
  if (minutes < 60) return '약 ' + minutes + '분';
  var h = Math.floor(minutes/60), m = minutes%60;
  return '약 ' + h + '시간' + (m ? ' ' + m + '분' : '');
}
 
function showTravelTimes(midLat, midLng) {
  var valid = friends.filter(function(f){return f.lat&&f.lng;});
  var odsayFailed = false;
 
  valid.forEach(function(f) {
    var badge = document.getElementById('time-'+f.id);
    if (!badge) return;
    badge.textContent = '계산 중…';
    badge.style.display = 'inline-block';
    badge.style.background = 'var(--accent-glow)';
    badge.style.color = 'var(--accent)';
 
    // ODsay API 호출
    fetch('/api/transit-time?sx='+f.lng+'&sy='+f.lat+'&ex='+midLng+'&ey='+midLat)
      .then(function(r){return r.json();})
      .then(function(data) {
        if (data.success) {
          // ODsay 성공 — 실제 대중교통 시간
          var text = formatMinutes(data.totalTime);
          if (data.transferCount > 0) text += ' (환승 '+data.transferCount+'회)';
          badge.textContent = text;
          badge.title = '대중교통 기준';
        } else {
          // ODsay 실패 (한도 초과 등) — 직선거리 추정으로 폴백
          var minutes = calcStraightMinutes(f.lat, f.lng, midLat, midLng);
          badge.textContent = formatMinutes(minutes);
          badge.title = '추정 시간 (직선거리 기준)';
          // 한도 초과면 배지 색 살짝 다르게
          if (data.reason === 'quota_exceeded' && !odsayFailed) {
            odsayFailed = true;
            console.warn('ODsay 일일 한도 초과 — 직선거리 추정값으로 표시');
          }
        }
      })
      .catch(function() {
        // 네트워크 오류 — 직선거리 폴백
        var minutes = calcStraightMinutes(f.lat, f.lng, midLat, midLng);
        badge.textContent = formatMinutes(minutes);
        badge.title = '추정 시간 (직선거리 기준)';
      });
  });
}
 
function setBusy(on) {
  document.getElementById('findBtn').disabled = on;
  document.getElementById('ld').classList.toggle('on', on);
}
 
window.addEventListener('load', init);
</script>
